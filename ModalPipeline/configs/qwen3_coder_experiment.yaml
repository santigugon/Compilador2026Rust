experiment_id: qwen3_coder_tb_v1
mode: pilot
serve_quantized_first: false

benchmark:
  harness: tritonbench4modal
  repo_url: https://github.com/thunlp/TritonBench.git
  dataset: simp
  limit: 5
  gpu_eval: T4

matrix:
  output_profiles:
    - tritonbench_python
  decoding_modes:
    - xgrammar_off
  sampling:
    - temperature: 0.0
      top_p: 1.0
  max_output_tokens:
    - 2048
  prompt_variants:
    - minimal
  repair_budgets:
    - 0
  runtime_limits:
    - name: default
      compile_timeout_s: 120
      exec_timeout_s: 300
      memory_cap_mb: null

seeds:
  - 0

paired_design: true

performance:
  min_speedup_vs_pytorch: 0.0

grammar_version: "1.0"
prompt_template_version: "tritonbench_v1"

volumes:
  model_cache: qwen3-model-cache
  results: qwen3-coder-results

paths:
  results_mount: /results
  model_cache_mount: /models

# Modal named secret (see docs/SECRETS.md). Not read at runtime yet; documented contract.
secrets:
  modal_secret_name: hf-token
  env_vars:
    - HF_TOKEN
    - HUGGING_FACE_HUB_TOKEN
