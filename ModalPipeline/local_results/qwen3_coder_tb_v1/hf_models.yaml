defaults:
  family: qwen3_coder
  backend: vllm_cuda
  base_model: Qwen/Qwen3-Coder-30B-A3B-Instruct
  benchmark_limit: 1
  gpu_serve: A100-80GB
  gpu_eval: A100-80GB
  enabled: true
  vllm:
    tensor_parallel_size: 1
    enable_expert_parallel: true
    # 30B MoE + long KV cache does not fit A10G; smoke uses 2048 max tokens
    max_model_len: 8192
    gpu_memory_utilization: 0.85

models:
  - name: qwen3_coder_30b_bf16
    hf_id: Qwen/Qwen3-Coder-30B-A3B-Instruct
    quantization: bf16_or_fp16
    backend: vllm_cuda
    role: baseline
    is_baseline: true
    gpu_serve: A100-80GB
    gpu_eval: A100-80GB

  - name: qwen3_coder_30b_awq_8bit
    hf_id: cyankiwi/Qwen3-Coder-30B-A3B-Instruct-AWQ-8bit
    quantization: awq_8bit
    backend: vllm_cuda
    role: high_precision_quantized
    gpu_serve: A100-80GB
    gpu_eval: A100-80GB
    vllm:
      # cyankiwi checkpoints ship as compressed-tensors, not legacy awq
      quantization: compressed-tensors

  - name: qwen3_coder_30b_gptq_int8
    hf_id: QuantTrio/Qwen3-Coder-30B-A3B-Instruct-GPTQ-Int8
    quantization: gptq_int8
    backend: vllm_cuda
    role: high_precision_quantized_alt
    gpu_serve: A100-80GB
    gpu_eval: A100-80GB
    vllm:
      quantization: gptq

  - name: qwen3_coder_30b_awq_4bit
    hf_id: cyankiwi/Qwen3-Coder-30B-A3B-Instruct-AWQ-4bit
    quantization: awq_4bit
    backend: vllm_cuda
    role: low_precision_candidate
    gpu_serve: A100-80GB
    gpu_eval: A100-80GB
    vllm:
      quantization: compressed-tensors

  - name: qwen3_coder_30b_gptq_4bit
    hf_id: btbtyler09/Qwen3-Coder-30B-A3B-Instruct-gptq-4bit
    quantization: gptq_4bit
    backend: vllm_cuda
    role: low_precision_candidate_alt
    gpu_serve: A100-80GB
    gpu_eval: A100-80GB
    vllm:
      quantization: gptq
